        <article>
            <figure>
                <picture>
                    <source [srcset]="image" type="image/png">
                    <img [src]="image" [alt]="name" frame="primary">
                </picture>
                <figcaption>
                    {{name}}
                </figcaption>
            </figure>
            <div>
                @for (d of description; track $index) {
                <p>{{d}}</p>
                }
            </div>
        </article>
