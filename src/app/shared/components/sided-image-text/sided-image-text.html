<section [class]="bg">
    <header>
        <h2 [class]="titleColor">{{title}}</h2>
    </header>
    <figure [classList]="imagePosition" container>
        <picture [class]="imgOrientation">
            <source [srcset]="imgURL" type="image">
            <img [src]="imgURL" [alt]="alt" frame="secondary" >
        </picture>
        <figcaption>
            @for (item of text; track $index) {
                <p>{{item}}</p>
            }
        </figcaption>
    </figure>
</section>
